server:
  port: 8080
  error:
    # Never leak internals to clients. The frontend only consumes {code,message}
    # from our handlers; everything else returns a generic error.
    include-stacktrace: never
    include-message: never
    include-binding-errors: never

spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}?sslmode=${PGSSLMODE:disable}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000
  jpa:
    hibernate:
      ddl-auto: validate          # schema is owned by the Python engine; never mutate it
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.format_sql: true
    show-sql: false

app:
  # --- Auth secrets (security-critical) -------------------------------------
  # Both are read from the environment. There is no shipped default: if the JWT
  # secret is unset the backend mints a random per-process key (tokens reset on
  # restart — set APP_AUTH_JWT_SECRET in production); if the admin password is
  # unset a random one is generated and logged once at first seed. See
  # JwtUtil / AdminSeeder and SECURITY.md.
  auth:
    jwt-secret: ${APP_AUTH_JWT_SECRET:}        # >= 32 chars; blank ⇒ random per boot
    jwt-ttl-seconds: ${APP_AUTH_JWT_TTL_SECONDS:604800}
  admin:
    email: ${APP_ADMIN_EMAIL:admin@gmail.com}
    password: ${APP_ADMIN_PASSWORD:}           # blank ⇒ random, logged once at seed
  geo:
    assumed-speed-kmh: 4.5          # municipal access lens: walking ("15-minute city" deprivation view)
    # Personal relocation planner uses a realistic mode-aware model: people walk
    # to nearby services but DRIVE to far ones (so a 30 km kindergarten doesn't
    # read as ~6 h each way on foot).
    personal:
      walk-speed-kmh: 4.5
      drive-speed-kmh: 28
      walk-threshold-km: 2.0          # car owners walk up to 2 km, drive beyond
  visits-per-year:
    children_0_6: 180
    seniors_65p: 24
  gemini:
    api-key: ${GEMINI_API_KEY:}            # set this env var to enable AI explanations
    model: ${GEMINI_MODEL:gemini-3.1-flash-lite}
  # Path to the deploy stamp written by scripts/deploy.sh; surfaced at GET /api/v1/version.
  # Empty when running locally without a deploy — the endpoint then reports "unknown".
  deploy-stamp-path: ${DEPLOY_STAMP_PATH:}
  # Civic Radar scraper. Normally runs bi-weekly as a standalone service; the admin
  # "force scrape" button shells out to it once on demand via these paths.
  radar:
    scraper:
      # Working directory of the Python data-engine (where the script + venv live).
      dir: ${RADAR_SCRAPER_DIR:../data-engine}
      # Python interpreter to use — the data-engine venv by default.
      python: ${RADAR_SCRAPER_PYTHON:../data-engine/venv/bin/python}
      script: ${RADAR_SCRAPER_SCRIPT:aop_scraper_service.py}
